<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳大河套集成电路研究院 - 测试间仪器设备管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            font-size: 1.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: 450px 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        .instrument-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }
        .instrument-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .instrument-item:hover {
            background: #e8e8e8;
        }
        .instrument-item.selected {
            background: #e3f2fd;
            border: 2px solid #2196f3;
        }
        .instrument-item.unavailable {
            opacity: 0.6;
            background: #ffebee;
            cursor: not-allowed;
        }
        .instrument-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .instrument-item input[type="number"] {
            width: 60px;
            padding: 5px;
            margin-left: 10px;
            text-align: center;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
        .qty-selector label {
            font-size: 12px;
            color: #666;
        }
        .instrument-info {
            flex: 1;
        }
        .instrument-name {
            font-weight: bold;
            color: #333;
        }
        .instrument-model {
            font-size: 12px;
            color: #666;
        }
        .instrument-location {
            font-size: 11px;
            color: #999;
        }
        .instrument-quantity {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }
        .qty-badge {
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .qty-available {
            background: #4caf50;
            color: white;
        }
        .qty-limited {
            background: #ff9800;
            color: white;
        }
        .qty-none {
            background: #f44336;
            color: white;
        }
        .btn-return {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-return:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(76, 175, 80, 0.3);
        }
        .time-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            min-width: 120px;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 14px;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f5f5f5;
            font-weight: bold;
            color: #333;
        }
        tr:hover {
            background: #f9f9f9;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
            display: block;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-available {
            background: #4caf50;
            color: white;
        }
        .status-limited {
            background: #ff9800;
            color: white;
        }
        .status-inuse {
            background: #f44336;
            color: white;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            width: auto;
            margin: 0;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }
        .import-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .import-section h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .import-section p {
            font-size: 13px;
            color: #666;
            margin-bottom: 10px;
        }
        .hidden {
            display: none !important;
        }
        /* 顶部导航栏 */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 10px 0;
        }
        .header-left {
            flex: 1;
            display: flex;
            align-items: center;
        }
        .user-display {
            color: white;
            font-size: 14px;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .user-display strong {
            color: #ffd700;
        }
        .header-bar h1 {
            margin: 0;
            flex: 2;
            font-size: 1.6em;
            margin-bottom: 0;
            text-align: center;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 6px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            white-space: nowrap;
            min-width: auto;
            width: auto;
            display: inline-block;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        /* 审批区域样式 */
        .admin-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .admin-section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .approval-item {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #ff9800;
        }
        .approval-item.approved {
            border-left-color: #4caf50;
        }
        .approval-item.rejected {
            border-left-color: #f44336;
        }
        .approval-info {
            margin-bottom: 10px;
        }
        .approval-info div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .approval-actions {
            display: flex;
            gap: 10px;
        }
        .btn-approve {
            background: #4caf50;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .btn-reject {
            background: #f44336;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            cursor: pointer;
        }
        .status-badge-small {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-pending {
            background: #ff9800;
            color: white;
        }
        .status-approved {
            background: #4caf50;
            color: white;
        }
        .status-rejected {
            background: #f44336;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="header-left">
                <span class="user-display" id="userDisplay">欢迎，<strong>访客</strong></span>
            </div>
            <h1>🏢 澳大河套集成电路研究院<br>🔬 测试间仪器设备管理系统</h1>
            <div style="flex: 1; text-align: right;">
                <button class="logout-btn" onclick="handleLogout()">退出</button>
            </div>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="grid" id="mainGrid">
            <!-- 仪器使用登记 -->
            <div class="card" id="registrationCard">
                <h2>📝 仪器使用登记</h2>
                
                <form id="registrationForm">
                    <div class="form-group">
                        <label for="userName">姓名 *</label>
                        <input type="text" id="userName" name="userName" required placeholder="请输入您的姓名">
                    </div>
                    
                    <div class="form-group">
                        <label>选择仪器 * <span style="font-weight: normal; color: #999;">(显示可用数量/总数量)</span></label>
                        <div class="instrument-list" id="instrumentList">
                            <div class="loading">正在加载仪器列表...</div>
                        </div>
                    </div>
                    
                    <button type="submit">提交登记</button>
                </form>
            </div>
            
            <!-- 右侧内容 -->
            <div>
                <!-- 统计卡片 -->
                <div class="card" style="margin-bottom: 20px;">
                    <h2>📊 仪器状态总览</h2>
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-number" id="totalCount">0</div>
                            <div class="stat-label">仪器总数</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="availableCount">0</div>
                            <div class="stat-label">可用数量</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="inUseCount">0</div>
                            <div class="stat-label">使用中</div>
                        </div>
                    </div>
                    
                    <table>
                        <thead>
                            <tr>
                                <th>仪器名称</th>
                                <th>型号</th>
                                <th>位置</th>
                                <th>可用/总数</th>
                                <th>状态</th>
                                <th>当前使用者</th>
                            </tr>
                        </thead>
                        <tbody id="instrumentTable">
                            <tr><td colspan="6" class="loading">正在加载...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- 使用记录 -->
                <div class="card">
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('current')">📋 当前使用</button>
                        <button class="tab" onclick="switchTab('history')">📚 历史记录</button>
                    </div>
                    
                    <div id="currentTab" class="tab-content active">
                        <table>
                            <thead>
                                <tr>
                                    <th>登记时间</th>
                                    <th>姓名</th>
                                    <th>仪器名称</th>
                                    <th>型号</th>
                                    <th>数量</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTable">
                                <tr><td colspan="6" class="loading">正在加载...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="historyTab" class="tab-content">
                        <table>
                            <thead>
                                <tr>
                                    <th>登记时间</th>
                                    <th>姓名</th>
                                    <th>使用仪器</th>
                                </tr>
                            </thead>
                            <tbody id="historyTable">
                                <tr><td colspan="3" class="loading">正在加载...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 管理员审批区域 -->
        <div id="approvalSection" class="admin-section hidden">
            <h2>📋 借用申请审批</h2>
            <div id="approvalList">
                <div class="loading">正在加载申请列表...</div>
            </div>
        </div>
        
        <!-- 用户管理区域 -->
        <div id="userManagementSection" class="admin-section hidden">
            <h2>👥 用户管理</h2>
            <div class="tabs">
                <button class="tab active" onclick="switchUserTab('pending')">待审批</button>
                <button class="tab" onclick="switchUserTab('all')">所有用户</button>
            </div>
            <div id="pendingUsersTab" class="tab-content active">
                <table>
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>姓名</th>
                            <th>注册时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="pendingUsersTable">
                        <tr><td colspan="4" class="loading">正在加载...</td></tr>
                    </tbody>
                </table>
            </div>
            <div id="allUsersTab" class="tab-content">
                <table>
                    <thead>
                        <tr>
                            <th>用户名</th>
                            <th>姓名</th>
                            <th>角色</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="allUsersTable">
                        <tr><td colspan="4" class="loading">正在加载...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // API基础URL
        const API_BASE = window.location.origin;
        
        // 数据存储
        let instruments = [];
        let records = [];
        let historyRecords = [];
        
        // 页面加载时初始化
        window.addEventListener('load', function() {
            loadData();
            
            // 每分钟刷新数据
            setInterval(loadData, 60000);
        });
        
        // 添加页面可见性检测，页面重新可见时刷新数据
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadData();
            }
        });
        
        // 加载数据
        async function loadData() {
            try {
                // 加载仪器列表
                const instResponse = await fetch(`${API_BASE}/api/instruments`);
                const instData = await instResponse.json();
                if (instData.success) {
                    instruments = instData.data;
                    updateInstrumentList();
                    updateInstrumentTable();
                    updateStats();
                }
                
                // 加载当前记录
                const recResponse = await fetch(`${API_BASE}/api/records`);
                const recData = await recResponse.json();
                if (recData.success) {
                    records = recData.data;
                    updateRecordsTable();
                }
                
                // 加载历史记录
                const histResponse = await fetch(`${API_BASE}/api/history`);
                const histData = await histResponse.json();
                if (histData.success) {
                    historyRecords = histData.data;
                    updateHistoryTable();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                showMessage('连接服务器失败，请确保服务器已启动 (python3 server.py)', 'error');
            }
        }
        
        // 更新仪器选择列表
        function updateInstrumentList() {
            const container = document.getElementById('instrumentList');
            container.innerHTML = '';
            
            instruments.forEach(inst => {
                const div = document.createElement('div');
                div.className = 'instrument-item';
                
                const available = inst.available !== undefined ? inst.available : inst.quantity;
                const isAvailable = available > 0;
                
                if (!isAvailable) {
                    div.classList.add('unavailable');
                }
                
                let qtyClass = 'qty-available';
                if (available === 0) qtyClass = 'qty-none';
                else if (available < inst.quantity * 0.3) qtyClass = 'qty-limited';
                
                const maxQty = isAvailable ? available : 0;
                div.innerHTML = `
                    <input type="checkbox" id="inst_${inst.id}" name="instruments" value="${inst.id}" 
                        ${!isAvailable ? 'disabled' : ''} onchange="toggleInstrument(this)">
                    <div class="instrument-info">
                        <div class="instrument-name">${inst.name}</div>
                        <div class="instrument-model">型号: ${inst.model || 'N/A'}</div>
                        <div class="instrument-location">位置: ${inst.location || 'N/A'}</div>
                    </div>
                    <div class="qty-selector">
                        <label>数量:</label>
                        <input type="number" id="qty_${inst.id}" name="qty_${inst.id}" 
                            min="1" max="${maxQty}" value="1" 
                            ${!isAvailable ? 'disabled' : ''}
                            onchange="validateQuantity(${inst.id}, ${maxQty})">
                    </div>
                    <div class="instrument-quantity">
                        <span class="qty-badge ${qtyClass}">${available}/${inst.quantity}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        // 切换仪器选择
        function toggleInstrument(checkbox) {
            const item = checkbox.closest('.instrument-item');
            const instId = checkbox.value;
            const qtyInput = document.getElementById(`qty_${instId}`);

            if (checkbox.checked) {
                item.classList.add('selected');
                if (qtyInput) qtyInput.disabled = false;
            } else {
                item.classList.remove('selected');
                if (qtyInput) {
                    qtyInput.disabled = true;
                    qtyInput.value = 1;
                }
            }
        }

        // 验证数量输入
        function validateQuantity(instId, maxQty) {
            const qtyInput = document.getElementById(`qty_${instId}`);
            let value = parseInt(qtyInput.value);

            if (value < 1) {
                qtyInput.value = 1;
            } else if (value > maxQty) {
                qtyInput.value = maxQty;
                showMessage(`仪器数量不能超过可用数量 ${maxQty} 台`, 'error');
            }
        }

        // 更新仪器状态表
        function updateInstrumentTable() {
            const tbody = document.getElementById('instrumentTable');
            tbody.innerHTML = '';
            
            instruments.forEach(inst => {
                const row = document.createElement('tr');
                const available = inst.available !== undefined ? inst.available : inst.quantity;
                
                let statusClass = '';
                let statusText = '';
                
                if (available === 0) {
                    statusClass = 'status-inuse';
                    statusText = '已满';
                } else if (available < inst.quantity * 0.3) {
                    statusClass = 'status-limited';
                    statusText = '紧张';
                } else {
                    statusClass = 'status-available';
                    statusText = '充足';
                }
                
                const currentUsers = inst.currentUsers && inst.currentUsers.length > 0 
                    ? inst.currentUsers.join(', ') 
                    : '-';
                
                row.innerHTML = `
                    <td>${inst.name}</td>
                    <td>${inst.model || 'N/A'}</td>
                    <td>${inst.location || 'N/A'}</td>
                    <td>${available}/${inst.quantity}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${currentUsers}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 更新统计
        function updateStats() {
            const total = instruments.reduce((sum, i) => sum + i.quantity, 0);
            const available = instruments.reduce((sum, i) => sum + (i.available !== undefined ? i.available : i.quantity), 0);
            const inUse = total - available;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('availableCount').textContent = available;
            document.getElementById('inUseCount').textContent = inUse;
        }
        
        // 更新当前记录表
        function updateRecordsTable() {
            const tbody = document.getElementById('recordsTable');
            tbody.innerHTML = '';
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #999;">暂无进行中的使用记录</td></tr>';
                return;
            }

            // 将记录按仪器拆分，每个仪器一行
            records.slice().reverse().forEach(record => {
                const instrumentIds = record.instrumentIds || [];
                const quantities = record.instrumentQuantities || {};
                
                instrumentIds.forEach((instId, index) => {
                    const inst = instruments.find(i => i.id === instId);
                    const instName = inst ? inst.name : '未知仪器';
                    const instModel = inst ? inst.model : '-';
                    const qty = quantities[instId] || 1;
                    
                    const row = document.createElement('tr');
                    // 只有登记本人才显示归还按钮，管理员不显示
                    const canReturn = currentUser && currentUser.name === record.userName && currentUser.role !== 'admin';
                    const returnButton = canReturn 
                        ? `<td><button class="btn-return" onclick="returnInstrument(${record.id}, ${instId})">归还</button></td>`
                        : '<td>-</td>';
                    
                    // 只有第一个仪器显示登记时间和姓名
                    const timeCell = index === 0 ? `<td rowspan="${instrumentIds.length}">${formatDateTime(record.registerTime)}</td>` : '';
                    const nameCell = index === 0 ? `<td rowspan="${instrumentIds.length}">${record.userName}</td>` : '';
                    
                    row.innerHTML = `
                        ${timeCell}
                        ${nameCell}
                        <td>${instName}</td>
                        <td>${instModel}</td>
                        <td>${qty}</td>
                        ${returnButton}
                    `;
                    tbody.appendChild(row);
                });
            });
        }
        
        // 更新历史记录表
        function updateHistoryTable() {
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = '';
            
            if (historyRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999;">暂无历史记录</td></tr>';
                return;
            }
            
            historyRecords.slice().reverse().slice(0, 50).forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDateTime(record.registerTime)}</td>
                    <td>${record.userName}</td>
                    <td>${record.instrumentNames}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

            if (tab === 'current') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('currentTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('historyTab').classList.add('active');
            }
        }

        // 退出登录
        async function handleLogout() {
            if (!confirm('确定要退出登录吗？')) {
                return;
            }
            try {
                await fetch(`${API_BASE}/api/auth/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
                window.location.href = '/login.html';
            } catch (error) {
                console.error('退出失败:', error);
                window.location.href = '/login.html';
            }
        }

        // 归还仪器
        async function returnInstrument(recordId, instrumentId) {
            if (!confirm('确定要归还该仪器吗？')) {
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/return`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ recordId: recordId, instrumentId: instrumentId })
                });

                const result = await response.json();

                if (result.success) {
                    showMessage(result.message || '仪器归还成功！', 'success');
                    loadData();
                } else {
                    if (response.status === 401) {
                        showMessage('请先登录', 'error');
                        window.location.href = '/login.html';
                    } else {
                        showMessage('归还失败: ' + result.error, 'error');
                    }
                }
            } catch (error) {
                showMessage('归还失败: ' + error.message, 'error');
            }
        }

        // 格式化日期时间
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        // 显示消息
        function showMessage(text, type) {
            // 尝试在主页面或登录页面显示消息
            let msgDiv = document.getElementById('message');
            if (!msgDiv || msgDiv.offsetParent === null) {
                msgDiv = document.getElementById('loginMessage');
            }
            if (!msgDiv) {
                // 如果都找不到，使用 alert
                alert(text);
                return;
            }
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }
        
        // 表单提交处理
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // 获取选中的仪器及数量
            const selectedInstruments = [];
            const instrumentQuantities = {};
            const checkboxes = document.querySelectorAll('input[name="instruments"]:checked');
            
            if (checkboxes.length === 0) {
                showMessage('请至少选择一台仪器！', 'error');
                return;
            }
            
            checkboxes.forEach(cb => {
                const instId = parseInt(cb.value);
                selectedInstruments.push(instId);
                
                // 获取数量
                const qtyInput = document.getElementById(`qty_${instId}`);
                const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                instrumentQuantities[instId] = qty;
            });
            
            // 获取仪器名称（包含数量）
            const instrumentNames = selectedInstruments.map(id => {
                const inst = instruments.find(i => i.id === id);
                const qty = instrumentQuantities[id];
                return inst ? `${inst.name}(${inst.model}) x${qty}台` : '';
            }).join(', ');
            
            // 创建记录数据（简化版）
            const now = new Date();
            const later = new Date(now.getTime() + 8 * 60 * 60 * 1000); // 默认使用8小时
            
            const recordData = {
                userName: document.getElementById('userName').value,
                userDept: '-',
                userContact: '-',
                instrumentIds: selectedInstruments,
                instrumentNames: instrumentNames,
                instrumentQuantities: instrumentQuantities,
                startTime: now.toISOString(),
                endTime: later.toISOString(),
                purpose: '-',
                notes: ''
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/borrow/apply`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify(recordData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('申请已提交，等待管理员审批', 'success');
                    this.reset();
                    document.querySelectorAll('.instrument-item').forEach(item => {
                        item.classList.remove('selected');
                    });
                    loadData();
                } else {
                    if (response.status === 401) {
                        showMessage('请先登录', 'error');
                        window.location.href = '/login.html';
                    } else {
                        showMessage('申请失败: ' + result.error, 'error');
                    }
                }
            } catch (error) {
                showMessage('提交失败，请检查服务器连接', 'error');
            }
        });
        
        // ==================== 管理员功能 ====================
        
        let currentUser = null;
        let pendingApplications = [];
        let pendingUsers = [];
        let allUsers = [];
        
        // 检查用户角色并显示相应功能
        async function checkUserRole() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    currentUser = data.data;
                    // 显示用户名在左上角
                    const userDisplay = document.getElementById('userDisplay');
                    if (userDisplay) {
                        userDisplay.innerHTML = `欢迎，<strong>${currentUser.name}</strong> ${currentUser.role === 'admin' ? '(管理员)' : ''}`;
                    }
                    if (currentUser.role === 'admin') {
                        // 显示管理员功能
                        document.getElementById('approvalSection').classList.remove('hidden');
                        document.getElementById('userManagementSection').classList.remove('hidden');
                        // 隐藏左侧登记表单并调整布局
                        document.getElementById('registrationCard').classList.add('hidden');
                        document.getElementById('mainGrid').style.gridTemplateColumns = '1fr';
                        loadPendingApplications();
                        loadPendingUsers();
                        loadAllUsers();
                    }
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }
        
        // 加载待审批申请
        async function loadPendingApplications() {
            try {
                const response = await fetch(`${API_BASE}/api/borrow/pending`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    pendingApplications = data.data;
                    updateApprovalList();
                }
            } catch (error) {
                console.error('加载审批列表失败:', error);
            }
        }
        
        // 更新审批列表
        function updateApprovalList() {
            const container = document.getElementById('approvalList');
            
            if (pendingApplications.length === 0) {
                container.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无待审批申请</div>';
                return;
            }
            
            container.innerHTML = pendingApplications.map(app => `
                <div class="approval-item">
                    <div class="approval-info">
                        <div><strong>申请人:</strong> ${app.userName} (${app.userDept || '无部门'})</div>
                        <div><strong>联系方式:</strong> ${app.userContact || '无'}</div>
                        <div><strong>申请仪器:</strong> ${app.instrumentNames}</div>
                        <div><strong>使用时间:</strong> ${formatDateTime(app.startTime)} 至 ${formatDateTime(app.endTime)}</div>
                        <div><strong>用途:</strong> ${app.purpose || '-'}</div>
                        <div><strong>申请时间:</strong> ${formatDateTime(app.applyTime)}</div>
                    </div>
                    <div class="approval-actions">
                        <button class="btn-approve" onclick="reviewApplication(${app.id}, 'approve')">通过</button>
                        <button class="btn-reject" onclick="showRejectDialog(${app.id})">拒绝</button>
                    </div>
                </div>
            `).join('');
        }
        
        // 审批申请
        async function reviewApplication(applicationId, action, reason = '') {
            try {
                const response = await fetch(`${API_BASE}/api/borrow/review`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ applicationId, action, reason })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    loadPendingApplications();
                    loadData();
                } else {
                    showMessage(data.error || '审批失败', 'error');
                }
            } catch (error) {
                showMessage('审批失败: ' + error.message, 'error');
            }
        }
        
        // 显示拒绝对话框
        function showRejectDialog(applicationId) {
            const reason = prompt('请输入拒绝原因:');
            if (reason !== null) {
                reviewApplication(applicationId, 'reject', reason);
            }
        }
        
        // 加载待审批用户
        async function loadPendingUsers() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/users/pending`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    pendingUsers = data.data;
                    updatePendingUsersTable();
                }
            } catch (error) {
                console.error('加载待审批用户失败:', error);
            }
        }
        
        // 加载所有用户
        async function loadAllUsers() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/users`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    allUsers = data.data;
                    updateAllUsersTable();
                }
            } catch (error) {
                console.error('加载用户列表失败:', error);
            }
        }
        
        // 更新待审批用户表
        function updatePendingUsersTable() {
            const tbody = document.getElementById('pendingUsersTable');
            
            if (pendingUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">暂无待审批用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = pendingUsers.map(user => `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.name}</td>
                    <td>${formatDateTime(user.created_at)}</td>
                    <td>
                        <button class="btn-approve" onclick="reviewUser(${user.id}, 'approve')">通过</button>
                        <button class="btn-reject" onclick="reviewUser(${user.id}, 'reject')">拒绝</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 更新所有用户表
        function updateAllUsersTable() {
            const tbody = document.getElementById('allUsersTable');
            
            if (allUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999;">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = allUsers.map(user => {
                let statusClass = 'status-approved';
                let statusText = '正常';
                if (user.status === 'pending') {
                    statusClass = 'status-pending';
                    statusText = '待审批';
                } else if (user.status === 'rejected') {
                    statusClass = 'status-rejected';
                    statusText = '已拒绝';
                }
                
                return `
                <tr>
                    <td>${user.username}</td>
                    <td>${user.name}</td>
                    <td>${user.role === 'admin' ? '管理员' : '普通用户'}</td>
                    <td><span class="status-badge-small ${statusClass}">${statusText}</span></td>
                </tr>
            `}).join('');
        }
        
        // 审批用户
        async function reviewUser(userId, action) {
            try {
                const response = await fetch(`${API_BASE}/api/admin/users/review`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ userId, action })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message, 'success');
                    loadPendingUsers();
                    loadAllUsers();
                } else {
                    showMessage(data.error || '审批失败', 'error');
                }
            } catch (error) {
                showMessage('审批失败: ' + error.message, 'error');
            }
        }
        
        // 切换用户管理标签
        function switchUserTab(tab) {
            document.querySelectorAll('#userManagementSection .tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('#userManagementSection .tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'pending') {
                document.querySelectorAll('#userManagementSection .tab')[0].classList.add('active');
                document.getElementById('pendingUsersTab').classList.add('active');
            } else {
                document.querySelectorAll('#userManagementSection .tab')[1].classList.add('active');
                document.getElementById('allUsersTab').classList.add('active');
            }
        }
        
        // 页面加载时检查用户角色
        window.addEventListener('load', function() {
            checkUserRole();
        });
    </script>
</body>
</html>
