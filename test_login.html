<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录测试</title>
    <style>
        body { font-family: Arial; padding: 50px; }
        .form { max-width: 300px; margin: 0 auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
        #result { margin-top: 20px; padding: 10px; background: #f0f0f0; }
    </style>
</head>
<body>
    <div class="form">
        <h2>测试登录</h2>
        <input type="text" id="username" placeholder="用户名">
        <input type="password" id="password" placeholder="密码">
        <button onclick="testLogin()">测试登录</button>
        <button onclick="testRegister()">测试注册</button>
        <div id="result"></div>
    </div>
    
    <script>
        const API_BASE = window.location.origin;
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.innerHTML = '正在登录...';
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = '<strong>登录结果:</strong><br>' + 
                    '状态: ' + response.status + '<br>' +
                    '成功: ' + data.success + '<br>' +
                    '数据: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = '<strong style="color:red">错误:</strong> ' + error.message;
            }
        }
        
        async function testRegister() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '正在注册...';
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: 'newuser', 
                        password: 'test123', 
                        name: '测试用户' 
                    })
                });
                
                const data = await response.json();
                resultDiv.innerHTML = '<strong>注册结果:</strong><br>' + 
                    '状态: ' + response.status + '<br>' +
                    '成功: ' + data.success + '<br>' +
                    '数据: ' + JSON.stringify(data, null, 2);
            } catch (error) {
                resultDiv.innerHTML = '<strong style="color:red">错误:</strong> ' + error.message;
            }
        }
    </script>
</body>
</html>
