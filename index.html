<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳大河套集成电路研究院 - 测试间仪器设备管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            opacity: 0.9;
        }
        .instrument-list {
            max-height: 300px;
            overflow-y: auto;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }
        .instrument-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
        }
        .instrument-item.selected {
            background: #e3f2fd;
            border: 2px solid #2196f3;
        }
        .instrument-item input[type="checkbox"] {
            width: auto;
            margin-right: 10px;
        }
        .qty-selector {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
        }
        .qty-selector input {
            width: 50px;
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: #f5f5f5;
            font-weight: bold;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
        }
        .status-available {
            background: #4caf50;
        }
        .status-limited {
            background: #ff9800;
        }
        .status-inuse {
            background: #f44336;
        }
        .btn-return {
            background: #4caf50;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .tab {
            padding: 10px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #4caf50;
            display: block;
        }
        .message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #f44336;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏢 澳大河套集成电路研究院<br>🔬 测试间仪器设备管理系统</h1>
        
        <div id="message" class="message"></div>
        
        <div class="grid">
            <div class="card">
                <h2>📝 仪器使用登记</h2>
                
                <form id="registrationForm">
                    <div class="form-group">
                        <label>姓名 *</label>
                        <input type="text" id="userName" required placeholder="请输入您的姓名">
                    </div>
                    
                    <div class="form-group">
                        <label>部门/项目组 *</label>
                        <input type="text" id="userDept" required placeholder="请输入部门或项目组">
                    </div>
                    
                    <div class="form-group">
                        <label>联系方式 *</label>
                        <input type="text" id="userContact" required placeholder="手机号或邮箱">
                    </div>
                    
                    <div class="form-group">
                        <label>选择仪器 *</label>
                        <div class="instrument-list" id="instrumentList">
                            <div style="text-align:center;padding:20px;color:#999;">正在加载...</div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>预计使用时间</label>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div>
                                <label style="font-weight: normal; font-size: 12px;">开始时间</label>
                                <input type="datetime-local" id="startTime" required>
                            </div>
                            <div>
                                <label style="font-weight: normal; font-size: 12px;">结束时间</label>
                                <input type="datetime-local" id="endTime" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>使用目的 *</label>
                        <textarea id="purpose" rows="3" required placeholder="请描述使用仪器的目的"></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label>备注</label>
                        <textarea id="notes" rows="2" placeholder="其他需要说明的事项"></textarea>
                    </div>
                    
                    <button type="submit">提交申请</button>
                </form>
            </div>
            
            <div>
                <div class="card" style="margin-bottom: 20px;">
                    <div class="stats-grid">
                        <div class="stat-box">
                            <div class="stat-number" id="totalCount">0</div>
                            <div>仪器总数</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="availableCount">0</div>
                            <div>可用数量</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-number" id="inUseCount">0</div>
                            <div>使用中</div>
                        </div>
                    </div>
                    
                    <h3 style="margin-bottom: 15px;">📊 仪器状态总览</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>仪器名称</th>
                                <th>型号</th>
                                <th>位置</th>
                                <th>可用/总数</th>
                                <th>状态</th>
                                <th>当前使用者</th>
                            </tr>
                        </thead>
                        <tbody id="instrumentTable">
                            <tr><td colspan="6" style="text-align:center;padding:20px;">正在加载...</td></tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="card">
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('current')">📋 当前使用</button>
                        <button class="tab" onclick="switchTab('history')">📚 历史记录</button>
                    </div>
                    
                    <div id="currentTab">
                        <table>
                            <thead>
                                <tr>
                                    <th>登记时间</th>
                                    <th>姓名</th>
                                    <th>使用仪器</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="recordsTable">
                                <tr><td colspan="4" style="text-align:center;padding:20px;">正在加载...</td></tr>
                            </tbody>
                        </table>
                    </div>
                    
                    <div id="historyTab" style="display: none;">
                        <table>
                            <thead>
                                <tr>
                                    <th>登记时间</th>
                                    <th>姓名</th>
                                    <th>使用仪器</th>
                                </tr>
                            </thead>
                            <tbody id="historyTable">
                                <tr><td colspan="3" style="text-align:center;padding:20px;">正在加载...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        let instruments = [];
        let records = [];
        let historyRecords = [];
        
        window.addEventListener('load', function() {
            loadData();
            
            // 设置默认时间
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('startTime').value = now.toISOString().slice(0, 16);
            
            const later = new Date(now.getTime() + 2 * 60 * 60 * 1000);
            document.getElementById('endTime').value = later.toISOString().slice(0, 16);
        });
        
        async function loadData() {
            try {
                const [instResponse, recResponse, histResponse, statsResponse] = await Promise.all([
                    fetch(`${API_BASE}/api/instruments`),
                    fetch(`${API_BASE}/api/records`),
                    fetch(`${API_BASE}/api/history`),
                    fetch(`${API_BASE}/api/stats`)
                ]);
                
                const instData = await instResponse.json();
                const recData = await recResponse.json();
                const histData = await histResponse.json();
                const statsData = await statsResponse.json();
                
                if (instData.success) {
                    instruments = instData.data;
                    updateInstrumentList();
                    updateInstrumentTable();
                }
                
                if (recData.success) {
                    records = recData.data;
                    updateRecordsTable();
                }
                
                if (histData.success) {
                    historyRecords = histData.data;
                    updateHistoryTable();
                }
                
                if (statsData.success) {
                    document.getElementById('totalCount').textContent = statsData.data.total;
                    document.getElementById('availableCount').textContent = statsData.data.available;
                    document.getElementById('inUseCount').textContent = statsData.data.inUse;
                }
            } catch (error) {
                showMessage('加载数据失败', 'error');
            }
        }
        
        function updateInstrumentList() {
            const container = document.getElementById('instrumentList');
            container.innerHTML = '';
            
            instruments.forEach(inst => {
                const div = document.createElement('div');
                div.className = 'instrument-item';
                
                const available = inst.available !== undefined ? inst.available : inst.quantity;
                const isAvailable = available > 0;
                
                if (!isAvailable) {
                    div.style.opacity = '0.6';
                    div.style.background = '#ffebee';
                }
                
                div.innerHTML = `
                    <input type="checkbox" id="inst_${inst.id}" value="${inst.id}" ${!isAvailable ? 'disabled' : ''} onchange="toggleInstrument(this)">
                    <div style="flex: 1;">
                        <div style="font-weight: bold;">${inst.name}</div>
                        <div style="font-size: 12px; color: #666;">型号: ${inst.model || 'N/A'}</div>
                        <div style="font-size: 12px; color: #666;">位置: ${inst.location || 'N/A'}</div>
                    </div>
                    <div class="qty-selector">
                        <label style="font-size: 12px;">数量:</label>
                        <input type="number" id="qty_${inst.id}" min="1" max="${available}" value="1" ${!isAvailable ? 'disabled' : ''}>
                    </div>
                    <div style="margin-left: 10px;">
                        <span style="background: ${available > 0 ? '#4caf50' : '#f44336'}; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px;">${available}/${inst.quantity}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }
        
        function toggleInstrument(checkbox) {
            const item = checkbox.closest('.instrument-item');
            if (checkbox.checked) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        }
        
        function updateInstrumentTable() {
            const tbody = document.getElementById('instrumentTable');
            tbody.innerHTML = '';
            
            instruments.forEach(inst => {
                const row = document.createElement('tr');
                const available = inst.available !== undefined ? inst.available : inst.quantity;
                
                let statusClass = 'status-available';
                let statusText = '充足';
                
                if (available === 0) {
                    statusClass = 'status-inuse';
                    statusText = '已满';
                } else if (available < inst.quantity * 0.3) {
                    statusClass = 'status-limited';
                    statusText = '紧张';
                }
                
                const currentUsers = inst.currentUsers && inst.currentUsers.length > 0 
                    ? inst.currentUsers.join(', ') 
                    : '-';
                
                row.innerHTML = `
                    <td>${inst.name}</td>
                    <td>${inst.model || 'N/A'}</td>
                    <td>${inst.location || 'N/A'}</td>
                    <td>${available}/${inst.quantity}</td>
                    <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                    <td>${currentUsers}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function updateRecordsTable() {
            const tbody = document.getElementById('recordsTable');
            tbody.innerHTML = '';
            
            if (records.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #999; padding: 20px;">暂无进行中的使用记录</td></tr>';
                return;
            }
            
            records.slice().reverse().forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDateTime(record.registerTime)}</td>
                    <td>${record.userName}</td>
                    <td>${record.instrumentNames}</td>
                    <td><button class="btn-return" onclick="returnInstrument(${record.id})">归还</button></td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function updateHistoryTable() {
            const tbody = document.getElementById('historyTable');
            tbody.innerHTML = '';
            
            if (historyRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align: center; color: #999; padding: 20px;">暂无历史记录</td></tr>';
                return;
            }
            
            historyRecords.slice().reverse().slice(0, 50).forEach(record => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${formatDateTime(record.registerTime)}</td>
                    <td>${record.userName}</td>
                    <td>${record.instrumentNames}</td>
                `;
                tbody.appendChild(row);
            });
        }
        
        function formatDateTime(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            if (tab === 'current') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('currentTab').style.display = 'block';
                document.getElementById('historyTab').style.display = 'none';
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('currentTab').style.display = 'none';
                document.getElementById('historyTab').style.display = 'block';
            }
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = 'message ' + type;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }
        
        async function returnInstrument(recordId) {
            if (!confirm('确定要归还这些仪器吗？')) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/return`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ recordId: recordId })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('仪器归还成功！', 'success');
                    loadData();
                } else {
                    showMessage('归还失败: ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('归还失败，请检查网络连接', 'error');
            }
        }
        
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const selectedInstruments = [];
            const instrumentQuantities = {};
            const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
            
            if (checkboxes.length === 0) {
                showMessage('请至少选择一台仪器！', 'error');
                return;
            }
            
            checkboxes.forEach(cb => {
                const instId = parseInt(cb.value);
                selectedInstruments.push(instId);
                
                const qtyInput = document.getElementById(`qty_${instId}`);
                const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                instrumentQuantities[instId] = qty;
            });
            
            const instrumentNames = selectedInstruments.map(id => {
                const inst = instruments.find(i => i.id === id);
                const qty = instrumentQuantities[id];
                return inst ? `${inst.name}(${inst.model}) x${qty}台` : '';
            }).join(', ');
            
            const recordData = {
                userName: document.getElementById('userName').value,
                userDept: document.getElementById('userDept').value,
                userContact: document.getElementById('userContact').value,
                instrumentIds: selectedInstruments,
                instrumentNames: instrumentNames,
                instrumentQuantities: instrumentQuantities,
                startTime: new Date(document.getElementById('startTime').value).toISOString(),
                endTime: new Date(document.getElementById('endTime').value).toISOString(),
                purpose: document.getElementById('purpose').value,
                notes: document.getElementById('notes').value
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/borrow/apply`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(recordData)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showMessage('申请已提交，等待管理员审批', 'success');
                    this.reset();
                    document.querySelectorAll('.instrument-item').forEach(item => {
                        item.classList.remove('selected');
                    });
                    loadData();
                } else {
                    showMessage('申请失败: ' + result.error, 'error');
                }
            } catch (error) {
                showMessage('提交失败，请检查网络连接', 'error');
            }
        });
    </script>
</body>
</html>
